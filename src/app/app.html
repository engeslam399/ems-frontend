<header class="app-navbar">
  <div class="nav-container">
    <a routerLink="/" class="nav-brand">
      <div class="logo-orb"></div>
      <span class="brand-text">EMS <span class="brand-accent">Registry</span></span>
    </a>
    <nav class="nav-menu">
      <a routerLink="/employees" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">
        <svg xmlns="http://www.w3.org/2000/svg" height="18" viewBox="0 -960 960 960" width="18" fill="currentColor">
          <path d="M240-200h120v-240h240v240h120v-360L480-740 240-440v360Zm-80 80v-480l320-240 320 240v480H520v-240h-80v240H160Zm320-350Z"/>
        </svg>
        <span>Dashboard</span>
      </a>
      <a routerLink="/employees/new" routerLinkActive="active" class="nav-link">
        <svg xmlns="http://www.w3.org/2000/svg" height="18" viewBox="0 -960 960 960" width="18" fill="currentColor">
          <path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"/>
        </svg>
        <span>Add Employee</span>
      </a>
      <a routerLink="/departments/new" routerLinkActive="active" class="nav-link">
        <svg xmlns="http://www.w3.org/2000/svg" height="18" viewBox="0 -960 960 960" width="18" fill="currentColor">
          <path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"/>
        </svg>
        <span>Add Department</span>
      </a>
    </nav>
  </div>
</header>

<main class="main-content">
  <!-- Global Toast Notification -->
  <div 
    class="toast slide-in-top" 
    [class.toast-success]="notification().type === 'success'"
    [class.toast-error]="notification().type === 'error'"
    *ngIf="notification().show"
  >
    <svg *ngIf="notification().type === 'success'" xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20" fill="currentColor">
      <path d="m424-296 282-282-56-56-226 226-114-114-56 56 170 170Zm56 216q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T209-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q167 0 283.5-116.5T880-480q0-167-116.5-283.5T480-800q-167 0-283.5 116.5T80-480q0 167 116.5 283.5T480-160Zm0-320Z"/>
    </svg>
    <svg *ngIf="notification().type === 'error'" xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20" fill="currentColor">
      <path d="M480-280q17 0 28.5-11.5T520-320q0-17-11.5-28.5T480-360q-17 0-28.5 11.5T440-320q0 17 11.5 28.5T480-280Zm-40-160h80v-240h-80v240Zm40 360q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T209-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q167 0 283.5-116.5T880-480q0-167-116.5-283.5T480-800q-167 0-283.5 116.5T80-480q0 167 116.5 283.5T480-160Zm0-320Z"/>
    </svg>
    <span>{{ notification().message }}</span>
  </div>

  <div class="glow-bg-container">
    <div class="glow-orb orb-primary"></div>
    <div class="glow-orb orb-secondary"></div>
  </div>
  <div class="content-wrapper">
    <router-outlet></router-outlet>
  </div>
</main>
